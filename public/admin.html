<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Turco Connect MX</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a1628; --bg-secondary: #0f1f3a; --bg-card: rgba(15, 31, 58, 0.8);
      --accent: #00e676; --text-primary: #e8ecf1; --text-secondary: #8899aa;
      --border-subtle: rgba(255, 255, 255, 0.1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Outfit',sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; padding:20px; }
    
    .login-container { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
    .login-box { background:var(--bg-card); padding:40px; border-radius:16px; border:1px solid var(--border-subtle); text-align:center; }
    .login-box input { width:100%; padding:12px; margin:20px 0; border-radius:8px; border:1px solid var(--border-subtle); background:rgba(0,0,0,0.2); color:white; }
    .login-box button { width:100%; padding:12px; border-radius:8px; border:none; background:var(--accent); color:#0a1628; font-weight:bold; cursor:pointer; }
    
    .dashboard { display:none; max-width:1200px; margin:0 auto; }
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; padding-bottom:20px; border-bottom:1px solid var(--border-subtle); }
    .header h1 { color:var(--accent); }
    
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom:30px; }
    .stat-card { background:var(--bg-secondary); padding:20px; border-radius:12px; border:1px solid var(--border-subtle); text-align:center; }
    .stat-card h3 { font-size:0.9rem; color:var(--text-secondary); margin-bottom:10px; }
    .stat-card .value { font-size:2rem; font-weight:bold; color:var(--accent); }
    
    table { width:100%; border-collapse:collapse; background:var(--bg-secondary); border-radius:12px; overflow:hidden; }
    th, td { padding:15px; text-align:left; border-bottom:1px solid var(--border-subtle); }
    th { background:rgba(0,0,0,0.2); color:var(--text-secondary); font-weight:500; }
    tr:hover { background:rgba(255,255,255,0.02); }
    
    .status-badge { padding:4px 10px; border-radius:20px; font-size:0.8rem; font-weight:600; }
    .status-waiting { background:rgba(255,145,0,0.15); color:#ff9100; border:1px solid rgba(255,145,0,0.3); }
    .status-chatting { background:rgba(0,230,118,0.15); color:#00e676; border:1px solid rgba(0,230,118,0.3); }
    .status-idle { background:rgba(255,255,255,0.1); color:var(--text-secondary); border:1px solid rgba(255,255,255,0.2); }
  </style>
</head>
<body>

  <div class="login-container" id="login-screen">
    <div class="login-box">
      <h2>Panel de Administración</h2>
      <input type="password" id="admin-pass" placeholder="Contraseña..." autofocus>
      <button id="btn-login">Ingresar</button>
      <p id="login-error" style="color:#ff8a80; margin-top:10px; display:none;">Contraseña incorrecta</p>
    </div>
  </div>

  <div class="dashboard" id="dashboard-screen">
    <div class="header">
      <h1>TURCO CONNECT MX <span style="color:var(--text-primary)">/ ADMIN</span></h1>
      <div id="connection-status" style="color:var(--accent)">🟢 Conectado</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Usuarios Online</h3>
        <div class="value" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <h3>Buscando (En cola)</h3>
        <div class="value" id="stat-waiting" style="color:#ff9100">0</div>
      </div>
      <div class="stat-card">
        <h3>En Chat</h3>
        <div class="value" id="stat-chatting">0</div>
      </div>
      <div class="stat-card">
        <h3>Matches Totales</h3>
        <div class="value" id="stat-matches" style="color:white">0</div>
      </div>
    </div>

    <h2>Usuarios Conectados</h2>
    <div style="overflow-x:auto; margin-top:15px;">
      <table>
        <thead>
          <tr>
            <th>Nombre / Apodo</th>
            <th>Edad</th>
            <th>Género</th>
            <th>Estado (Ciudad)</th>
            <th>Status</th>
            <th>Conectado a las</th>
          </tr>
        </thead>
        <tbody id="users-table">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const loginScreen = document.getElementById('login-screen');
    const dashScreen = document.getElementById('dashboard-screen');
    
    // Auto-login if password in URL
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('password')) {
      socket.emit('admin:join', { password: urlParams.get('password') });
    }

    document.getElementById('btn-login').addEventListener('click', () => {
      socket.emit('admin:join', { password: document.getElementById('admin-pass').value });
    });
    document.getElementById('admin-pass').addEventListener('keypress', (e) => {
      if(e.key === 'Enter') socket.emit('admin:join', { password: e.target.value });
    });

    socket.on('admin:auth', data => {
      if(data.success) {
        loginScreen.style.display = 'none';
        dashScreen.style.display = 'block';
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    });

    socket.on('admin:stats', stats => {
      document.getElementById('stat-total').textContent = stats.total;
      document.getElementById('stat-waiting').textContent = stats.waiting;
      document.getElementById('stat-chatting').textContent = stats.chatting;
      document.getElementById('stat-matches').textContent = stats.totalMatches;
    });

    socket.on('admin:users', users => {
      const tbody = document.getElementById('users-table');
      tbody.innerHTML = '';
      
      users.reverse().forEach(u => {
        const tr = document.createElement('tr');
        
        const d = new Date(u.connectedAt);
        const timeStr = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
        
        let statusClass = 'status-idle';
        let statusText = 'Inactivo';
        if(u.status === 'waiting') { statusClass = 'status-waiting'; statusText = 'Buscando...'; }
        if(u.status === 'chatting') { statusClass = 'status-chatting'; statusText = 'En chat'; }

        tr.innerHTML = `
          <td><strong>${u.name}</strong></td>
          <td>${u.age}</td>
          <td style="text-transform:capitalize">${u.gender}</td>
          <td style="text-transform:capitalize">${u.city.replace(/_/g, ' ')}</td>
          <td><span class="status-badge ${statusClass}">${statusText}</span></td>
          <td>${timeStr}</td>
        `;
        tbody.appendChild(tr);
      });
    });

    socket.on('disconnect', () => {
      document.getElementById('connection-status').innerHTML = '🔴 Desconectado';
      document.getElementById('connection-status').style.color = '#ff8a80';
    });
    socket.on('connect', () => {
      if(dashScreen.style.display === 'block') {
        document.getElementById('connection-status').innerHTML = '🟢 Conectado';
        document.getElementById('connection-status').style.color = 'var(--accent)';
      }
    });
  </script>
</body>
</html>
